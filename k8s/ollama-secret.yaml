# Phase 1.5.6: backend → Ollama basic auth.
# Only consumed if the proxy in front of Ollama (Caddy/Traefik on the
# home box) actually requires basic auth. The Secret is marked optional
# in the Deployment, so the backend boots either way.
#
# To enable: replace the placeholders with real base64-encoded values
# (echo -n 'value' | base64) and configure basic auth on the Ollama proxy.
apiVersion: v1
kind: Secret
metadata:
  name: pushup-api-ollama
  namespace: pushups
type: Opaque
stringData:
  OLLAMA_USER: replace-me
  OLLAMA_PASSWORD: replace-me
