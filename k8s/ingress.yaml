apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pushup-api
  namespace: pushups
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # No middleware here — auth is enforced by the Hono Bearer middleware
    # at the application layer. See backend/src/middleware/bearerAuth.ts
    # and backend/src/index.ts (`app.use('/api/*', bearerAuth(...))`).
spec:
  ingressClassName: traefik
  rules:
  - host: pushups.wire.mattjewell.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pushup-api
            port:
              number: 80
