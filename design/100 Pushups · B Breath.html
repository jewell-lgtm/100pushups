<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>100 Pushups · B Breath</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400..700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="direction-b.jsx"></script>
  <script type="text/babel">
    function Phone({ children }) {
      return <AndroidDevice width={400} height={840}>{children}</AndroidDevice>;
    }
    const wrap = (label, Cmp) => (
      <div data-screen-label={label} style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'#f5f0e8' }}>
        <Phone><Cmp /></Phone>
      </div>
    );
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="b" title="Breath · 100 Pushups" subtitle="Voice-first coaching · warm wellness aesthetic · 6 screens">
            <DCArtboard id="onboarding" label="01 · Onboarding" width={420} height={860}>{wrap('Onboarding', B_OnboardingScreen)}</DCArtboard>
            <DCArtboard id="workout"    label="02 · Workout (main)" width={420} height={860}>{wrap('Workout', B_WorkoutScreen)}</DCArtboard>
            <DCArtboard id="complete"   label="03 · Session complete" width={420} height={860}>{wrap('Complete', B_CompleteScreen)}</DCArtboard>
            <DCArtboard id="stats"      label="04 · Stats · PB" width={420} height={860}>{wrap('Stats', B_StatsScreen)}</DCArtboard>
            <DCArtboard id="history"    label="05 · History" width={420} height={860}>{wrap('History', B_HistoryScreen)}</DCArtboard>
            <DCArtboard id="settings"   label="06 · Settings" width={420} height={860}>{wrap('Settings', B_SettingsScreen)}</DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
